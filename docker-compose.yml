services:
  frontend:
    image: caddy:2
    container_name: rep-tracker-frontend
    depends_on:
      - backend
    ports:
      - "8020:80"
      - "8021:443"
    volumes:
      - ./index.html:/srv/index.html:ro
      - ./style.css:/srv/style.css:ro
      - ./script.js:/srv/script.js:ro
      - ./icon.svg:/srv/icon.svg:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  backend:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: rep-tracker-backend
    volumes:
      - pocketbase_data:/pb/pb_data
    restart: unless-stopped

volumes:
  pocketbase_data:
  caddy_data:
  caddy_config:
