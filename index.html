<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    
    <title>Rep Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="top-controls">
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">🌙</button>
            <button id="share-btn" class="icon-btn" aria-label="Share Progress">⎋</button>
        </div>

        <h1>Push-Up Tracker</h1>

        <div class="counter-display">
            <span id="rep-count">0</span>
            <p>Total Reps</p>
        </div>

        <div class="goal-container">
            <div class="progress-track">
                <div id="progress-bar"></div>
            </div>
            <div class="goal-row">
                <span>Goal: <span id="current-goal-display">50</span></span>
                <button id="set-goal-btn" class="small-link">Edit Goal</button>
            </div>
        </div>

        <div class="input-group">
            <input type="number" id="rep-input" placeholder="Reps this set..." pattern="\d*" inputmode="numeric">
            <button id="add-btn">Add Set</button>
        </div>

        <div class="history-section">
            <h3>Session History</h3>
            <ul id="history-list">
                </ul>
        </div>

        <button id="reset-btn">Reset Session Data</button>
    </div>

    <audio id="success-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
