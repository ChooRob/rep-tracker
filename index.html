<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.svg">
    
    <title>Rep Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="top-controls">
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">🌙</button>
            <button id="share-btn" class="icon-btn" aria-label="Share Progress">⎋</button>
        </div>

        <button id="exercise-title-btn" class="exercise-title-btn">
            <div class="icon-container"></div>
            <h1>Push-ups</h1> 
            <span>▼</span>
        </button>

        <div class="counter-display">
            <span id="rep-count">0</span>
            <p>Total Reps</p>
        </div>

        <div class="goal-container">
            <div class="progress-track">
                <div id="progress-bar"></div>
            </div>
            <div class="goal-row">
                <span>Goal: <span id="current-goal-display">100</span></span>
                <button id="set-goal-btn" class="small-link">Edit Goal</button>
            </div>
        </div>

        <div class="input-group">
            <button id="show-rep-modal-btn">Add Reps</button>
        </div>

        <div class="history-section">
            <h3>Session History</h3>
            <ul id="history-list">
            </ul>
        </div>

        <button id="reset-btn">Reset Session Data</button>
    </div>

    <div class="container" id="calendar-container">
        <div class="calendar-top-header">
            <h2>Monthly Progress</h2>
            <button id="calendar-view-toggle" class="small-link">Weekly View</button>
        </div>
        <div class="calendar-header">
            <button id="prev-month-btn">&lt;</button>
            <h3 id="month-year-header"></h3>
            <button id="next-month-btn">&gt;</button>
        </div>
        <div id="calendar-grid" class="calendar-grid"></div>
    </div>

    <!-- Rep Input Modal -->
    <div id="rep-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div id="circular-slider" class="circular-slider">
                <svg viewBox="0 0 120 120">
                    <circle class="slider-bg" cx="60" cy="60" r="54"/>
                    <path class="slider-progress" d="M 60,6 A 54,54 0 0 1 60,6"/>
                    <circle class="slider-handle" cx="60" cy="6" r="8"/>
                </svg>
                <div class="rep-display">
                    <span id="modal-rep-count">0</span>
                    <p>Reps</p>
                </div>
            </div>
            <button id="confirm-reps-btn">Add</button>
            <button id="cancel-reps-btn" class="text-btn">Cancel</button>
        </div>
    </div>
    
    <!-- Exercise Selection Modal -->
    <div id="exercise-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2>Select Exercise</h2>
            <div id="exercise-picker" class="picker-container">
                <!-- Picker items will be generated by JS -->
            </div>
            <button id="confirm-exercise-btn" class="confirm-btn">Select</button>
        </div>
    </div>

    <audio id="success-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
